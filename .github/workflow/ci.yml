name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: unit + integration (nextest)
        run: cargo nextest run --workspace --all-targets --locked
      - name: release build (sanity)
        run: cargo build --workspace --release --locked

  docs:
    name: rustdoc
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: docs
      - run: cargo doc --no-deps --workspace --locked

  msrv:
    name: msrv check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: extract rust-version from Cargo.toml
        id: msrv
        run: |
          msrv=$(grep -E '^\s*rust-version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          if [ -z "$msrv" ]; then
            echo "rust-version not declared in Cargo.toml" >&2
            exit 1
          fi
          echo "msrv detected: $msrv"
          echo "msrv=$msrv" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: msrv-${{ steps.msrv.outputs.msrv }}
      - run: cargo check --workspace --all-targets --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  typos:
    name: typos
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: crate-ci/typos@v1

  ci-pass:
    name: ci-pass
    if: always()
    needs: [fmt, clippy, test, docs, msrv, deny, typos]
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: verify all required jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "one or more required jobs failed, were cancelled, or were skipped"
            exit 1
          fi
          echo "all required jobs passed"
